<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FM Display - Game Show</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

    <div id="massiveStrikeOverlay" class="massive-strike" style="display:none;">✕</div>

    <header class="global-header">
        <img src="user_logo_left.png" class="brand-logo">
        <img src="user_logo_right.png" class="brand-logo">
    </header>

    <div class="gala-title-container">
        <h2 class="gala-title">GENERATION GALA</h2>
    </div>

    <!-- LEADERBOARD OVERLAY -->
    <div id="globalLeaderboardOverlay" class="global-leaderboard-overlay">
        <h1 class="leaderboard-title">LEADERBOARD</h1>
        <div class="leaderboard-table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>RANK</th>
                        <th>TEAM NAME</th>
                        <th>TOTAL SCORE</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Rows will be injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="fm-container" style="display:none;">

        <h1 class="round-title">FAST MONEY</h1>

        <div id="activePlayerBanner" class="active-player-banner" style="display:none;"></div>

        <div class="question-container" style="margin-bottom: 20px;">
            <div id="audienceQuestionDisplay" class="question-inline-display"
                style="display:none; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border: 1px solid rgba(0, 243, 255, 0.3); text-align: center;">
                <h3 id="questionText" style="margin: 0; color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);">
                    Loading Question...
                </h3>
            </div>
        </div>

        <div class="fm-content">

            <div class="timer-section">

                <div class="timer-label">TIME REMAINING</div>

                <div class="timer-display" id="timerDisplay">00:00</div>

            </div>

            <div class="scoreboard single-team">

                <div class="team-box team-a">

                    <div class="team-name" id="teamAName">Team A</div>

                    <div class="player-scores">

                        <div class="player-box">
                            <div class="player-name" id="playerA1Name">Player 1</div>
                            <div class="score" id="scoreA1">0</div>
                        </div>

                        <div class="player-box">
                            <div class="player-name" id="playerA2Name">Player 2</div>
                            <div class="score" id="scoreA2">0</div>
                        </div>

                    </div>

                    <div class="combined-section">

                        <div class="combined-label">COMBINED TOTAL</div>

                        <div id="combinedScore" class="combined-score">0</div>

                        <div class="target-score">
                            Target: <span>200</span>
                        </div>

                    </div>

                </div>

            </div>

            <div class="answer-board">

                <div id="answerBoard" class="board-grid">

                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>

                </div>

            </div>

        </div>
    </div>

    <script>

        const socket = io();
        let totalSlots = 8;


        /* QUESTION BROADCAST */

        socket.on("broadcastCurrentQuestion", (questionData) => {

            if (questionData && questionData.answers) {

                totalSlots = questionData.answers.length;

            }

        });


        /* FIX #4: Reset totalSlots when game resets */
        socket.on("stateUpdate", (state) => {

            if (!state.currentQuestion || !state.currentQuestion.answers) {
                totalSlots = 8;
            }

        });


        /* =====================================================
        DISPLAY VISIBILITY HELPER
        ===================================================== */
        function updateDisplayVisibility(state) {
            const fmContainer = document.querySelector(".fm-container");
            const titleContainer = document.querySelector(".gala-title-container");

            if (!fmContainer) return;

            const round = state.currentRound;
            // Check if teamA has been set to something other than empty/placeholder
            const hasMatchup = state.teamA && state.teamA.name &&
                state.teamA.name !== "" &&
                state.teamA.name !== "none";

            console.log("Visibility Update:", { round, hasMatchup, teamAName: state.teamA?.name });

            // If a round is active, always show the game
            if (round === "Fast Money" || round === "fastmoney") {
                fmContainer.style.display = "flex";
                if (titleContainer) titleContainer.style.display = "none";
                return;
            }

            // If no round, show scoreboard ONLY if there is a matchup
            if (hasMatchup) {
                fmContainer.style.display = "flex";
                if (titleContainer) titleContainer.style.display = "none";
            } else {
                fmContainer.style.display = "none";
                if (titleContainer) titleContainer.style.display = "block";
            }
        }

        /* STATE UPDATE */

        socket.on("stateUpdate", (state) => {

            const roundTitle = document.querySelector(".round-title");
            if (roundTitle) {
                roundTitle.style.display = (state.showQuestion !== false) ? "block" : "none";
            }

            const qBox = document.getElementById("audienceQuestionDisplay");
            if (qBox) {
                const qHeader = document.getElementById("questionText");
                const shouldShow = state.showQuestion !== false;

                if (shouldShow && state.currentQuestion?.question) {
                    if (qHeader) qHeader.textContent = state.currentQuestion.question;
                    qBox.style.display = "block";
                } else {
                    qBox.style.display = "none";
                }
            }

            if (state.currentRound !== undefined) {
                updateDisplayVisibility(state);
            }

            if (state.currentQuestion && state.currentQuestion.answers) {

                totalSlots = state.currentQuestion.answers.length;

            }

            const teamNameEl = document.getElementById("teamAName");

            if (teamNameEl && state.teamA) {

                teamNameEl.textContent = state.teamA.name || "Team A";

            }

            const p1Name = document.getElementById("playerA1Name");
            const p2Name = document.getElementById("playerA2Name");

            if (state.teamA && state.teamA.players) {

                if (p1Name) p1Name.textContent = state.teamA.players[0] || "Player 1";
                if (p2Name) p2Name.textContent = state.teamA.players[1] || "Player 2";

            }

            const p1Score = state.teamA?.playerScores?.[0] || 0;
            const p2Score = state.teamA?.playerScores?.[1] || 0;

            const s1 = document.getElementById("scoreA1");
            const s2 = document.getElementById("scoreA2");
            const combined = document.getElementById("combinedScore");

            if (s1) s1.textContent = p1Score;
            if (s2) s2.textContent = p2Score;
            if (combined) combined.textContent = p1Score + p2Score;

            /* FIX #3: CRITICAL - Explicitly hide banner when resetting */
            const banner = document.getElementById("activePlayerBanner");
            if (!state.activePlayer || state.activePlayer === "none") {
                if (banner) {
                    banner.style.display = "none";
                    banner.style.animation = "none";  // Stop animation CPU usage
                }
            } else if (banner) {
                banner.style.animation = "bannerPulse 1.5s infinite";  // Resume animation
            }

            updateActivePlayerBanner(state.activePlayer, state.teamA);

            rebuildAnswerBoard(state.revealedAnswers || []);

        });


        /* ANSWER BOARD */

        function rebuildAnswerBoard(revealedAnswers) {

            const board = document.getElementById("answerBoard");

            if (!board) return;

            board.innerHTML = "";

            for (let i = 0; i < totalSlots; i++) {

                const box = document.createElement("div");

                if (i < revealedAnswers.length) {

                    const ans = revealedAnswers[i];

                    if (ans.answer === "❌") {

                        box.className = "answer-box placeholder is-cross";
                        box.textContent = "❌";

                    } else {

                        box.className = "answer-box revealed";

                        box.innerHTML = `
<span class="answer-text">${ans.answer}</span>
<span class="answer-weight">${ans.weight ?? ""}</span>
`;

                    }

                } else {

                    box.className = "answer-box placeholder";
                    box.textContent = "?";

                }

                board.appendChild(box);

            }

        }


        /* ACTIVE PLAYER BANNER */

        function updateActivePlayerBanner(activePlayer, teamA) {

            const banner = document.getElementById("activePlayerBanner");

            if (!banner) return;

            if (activePlayer && activePlayer !== "none") {

                const playerIdx = Number(activePlayer.replace(/\D/g, '')) - 1;

                const playerName = teamA?.players?.[playerIdx] || `Player ${playerIdx + 1}`;

                banner.textContent = `🎤 NOW PLAYING: ${playerName}`;

                banner.style.display = "block";

            } else {

                banner.style.display = "none";

            }

        }


        /* TIMER */

        socket.on("timerUpdate", (seconds) => {

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;

            const timer = document.getElementById("timerDisplay");

            if (timer) {

                timer.textContent = `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;

            }

        });


        /* STRIKE BUZZER */

        let audioContext;

        function playBuzzerSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = "sine";

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.15);
            } catch (error) {
                console.warn("Audio blocked by browser.");
            }
        }

        socket.on("playBuzzer", () => {
            playBuzzerSound();
        });


        /* OVERLAY SYSTEM */

        function showOverlay(content) {

            let overlay = document.getElementById("revealOverlay");

            if (!overlay) {

                overlay = document.createElement("div");

                overlay.id = "revealOverlay";

                overlay.style.position = "fixed";
                overlay.style.top = "0";
                overlay.style.left = "0";
                overlay.style.width = "100vw";
                overlay.style.height = "100vh";
                overlay.style.background = "rgba(0,0,0,0.92)";
                overlay.style.display = "flex";
                overlay.style.alignItems = "center";
                overlay.style.justifyContent = "center";
                overlay.style.zIndex = "10000";
                overlay.style.color = "white";

                document.body.appendChild(overlay);

            }

            overlay.innerHTML = content;
            overlay.style.display = "flex";

        }

        function hideOverlay() {

            const overlay = document.getElementById("revealOverlay");

            if (overlay) {

                overlay.style.display = "none";

            }

        }

        socket.on("showThankYouScreen", (show) => {
            if (show) {
                showOverlay(`<h1 style="font-size: 6rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); text-align: center;">THANK YOU<br>FOR PLAYING!</h1>`);
            } else {
                hideOverlay();
            }
        });


        /* =====================================================
        LEADERBOARD DISPLAY LOGIC
        ===================================================== */

        socket.on("leaderboardToggle", (data) => {
            const overlayElement = document.getElementById("globalLeaderboardOverlay");
            if (!overlayElement) return;

            if (data.show) {
                const teams = data.teams || [];
                teams.sort((a, b) => b.score - a.score);

                let highestScore = teams.length > 0 ? teams[0].score : 0;

                let rowsHtml = teams.map((team, index) => {
                    const isWinner = team.score === highestScore && highestScore > 0;
                    const rank = index + 1;

                    return `
                        <tr class="${isWinner ? 'winner-row' : ''}">
                            <td>
                                ${isWinner ? '<span class="lb-table-crown">👑</span>' : ''}
                                <span class="rank-badge">${rank}</span>
                            </td>
                            <td>
                                <div class="lb-table-team-name">${team.name}</div>
                            </td>
                            <td>${team.score}</td>
                        </tr>
                    `;
                }).join('');

                const container = document.getElementById("leaderboardBody");
                if (container) {
                    container.innerHTML = rowsHtml;
                }

                overlayElement.classList.add("show");
            } else {
                overlayElement.classList.remove("show");
            }
        });

        socket.on("displayWinner", (data) => {
            const w1 = data.winner1 || "";
            const w2 = data.winner2 || "";

            const content = `
                <div class="winner-announcement" style="text-align: center; animation: winnerFadeIn 1s cubic-bezier(0.25, 0.8, 0.25, 1); background: rgba(0,0,0,0.9); padding: 60px; border-radius: 40px; box-shadow: 0 0 100px rgba(255, 215, 0, 0.3); border: 2px solid rgba(255, 215, 0, 0.5); max-width: 90vw;">
                    
                    <div style="display: flex; justify-content: center; gap: 80px; align-items: flex-end; margin-bottom: 60px;">
                        
                        <!-- 2ND PLACE -->
                        ${w2 ? `
                        <div style="flex: 1; max-width: 400px; animation: winnerFadeIn 1.2s ease-out;">
                            <div style="font-size: 1.8rem; color: #a8b2d1; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px;">2nd Place</div>
                            <div style="background: rgba(192, 192, 192, 0.1); border: 1px solid rgba(192, 192, 192, 0.3); padding: 30px; border-radius: 20px;">
                                <div style="font-size: 4rem; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); font-weight: 800; word-break: break-word;">${w2}</div>
                            </div>
                        </div>
                        ` : ''}

                        <!-- 1ST PLACE -->
                        ${w1 ? `
                        <div style="flex: 1.2; max-width: 500px; animation: winnerFadeIn 0.8s ease-out;">
                            <div style="font-size: 2.5rem; color: #ffd700; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 15px; font-weight: 900;">🏆 1st Place 🏆</div>
                            <div style="background: rgba(255, 215, 0, 0.15); border: 2px solid rgba(255, 215, 0, 0.5); padding: 40px; border-radius: 30px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);">
                                <div style="font-size: 6rem; color: #fff; text-shadow: 0 0 40px rgba(255, 215, 0, 0.6); font-weight: 900; word-break: break-word;">${w1}</div>
                            </div>
                        </div>
                        ` : ''}

                    </div>

                    <div style="width: 200px; height: 4px; background: linear-gradient(to right, transparent, #ffd700, transparent); margin: 40px auto;"></div>
                    
                    <div style="font-size: 2.5rem; color: #00f3ff; font-style: italic; line-height: 1.6; max-width: 900px; margin: 40px auto 0;">
                        "Thank you for attending!<br>
                        This was <span style="color: #fff; font-weight: 900; background: linear-gradient(135deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Generation Gala 2026</span> for you." ✨
                    </div>
                </div>
            `;
            showOverlay(content);
        });

        socket.on("hideWinner", () => {
            hideOverlay();
        });

        // Add CSS animation to the document
        const style = document.createElement('style');
        style.textContent = `
            @keyframes winnerFadeIn {
                from { opacity: 0; transform: scale(0.8); }
                to { opacity: 1; transform: scale(1); }
            }
        `;
        document.head.appendChild(style);

    </script>

</body>

</html>
